#region tables
- type: entityTable
  id: TableRandomPosterContrabandBH
  table: !type:GroupSelector
    children:
    - id: ASPosterContrabandBHLogo

- type: entityTable
  id: TableRandomPosterContrabandIAC
  table: !type:GroupSelector
    children:
    - id: ASPosterContrabandIACLogo

- type: entityTable
  id: TableRandomPosterLegit
  table: !type:GroupSelector
    children:
    - id: ASPosterLegitAuroraSector

#regions spawners
- type: entity
  id: ASSpawnerRandomPosterAurora
  parent: MarkerBase
  name: random poster spawner
  suffix: Aurora only posters
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Wallmounts/posters.rsi
      state: random_anything
    - sprite: Effects/crayondecals.rsi
      state: n
      offset: -0.2,0
    - sprite: Effects/crayondecals.rsi
      state: f
      offset: 0.2,0
  - type: EntityTableSpawner
    offset: 0
    deleteSpawnerAfterSpawn: true
    table: !type:GroupSelector
      children:
      - !type:NestedSelector
        tableId: TableRandomPosterContrabandBH
      - !type:NestedSelector
        tableId: TableRandomPosterContrabandIAC
      - !type:NestedSelector
        tableId: TableRandomPosterLegit
