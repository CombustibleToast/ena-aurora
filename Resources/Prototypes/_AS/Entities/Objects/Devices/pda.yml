#region Base

- type: entity
  abstract: true
  parent: BasePDA
  id: ASBasePDA
  name: PDA
  description: Personal Data Assistant.
  components:
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda
  - type: Sprite
    sprite: _AS/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Icon
    sprite: _AS/Objects/Devices/pda.rsi
    state: pda
  - type: Pda
    paiSlot:
      priority: -4
      whitelist:
        components:
        - PAI
    penSlot:
      startingItem: Pen
      priority: -1
      whitelist:
        tags:
        - Write

- type: entity
  parent: BasePDA
  id: ASBaseSecurityPDA # copy of BaseSecurityPDA from NF with different sprite directory
  abstract: true
  components:
  - type: Sprite
    sprite: _AS/Objects/Devices/pda.rsi
  - type: Icon
    sprite: _AS/Objects/Devices/pda.rsi
  - type: CartridgeLoader
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NewsReaderCartridge
    - BountyContractsCartridge
    - AstroNavCartridge
    - WantedListCartridge

