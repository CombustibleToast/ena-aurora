#region manufacturer
- type: entity
  id: ASBaseWeaponFramePistolHazardZone
  parent: NFBaseWeaponFramePistol
  abstract: true
  components:
  - type: Gun
    minAngle: 1
    maxAngle: 22
    angleIncrease: 4
    angleDecay: 4
    fireRate: 3.5
  - type: NFWeaponDetails
    manufacturer: weapon-details-manufacturer-hzi

#region chamger

- type: entity
  id: ASBaseWeaponPistolChamber40
  parent: NFBaseWeaponPistolChamber
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-caliber-40
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
      params:
        pitch: 0.85
        volume: -2
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ASMagazinePistol40
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist: &whitelist40
          tags:
            - ASMagazinePistol40
            - ASMagazineHighCapacityPistol40
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: &chamber35Standard
        name: Chamber
        startingItem: ASCartridgePistol40
        priority: 1
        whitelist:
          tags:
            - ASCartridgePistol40

