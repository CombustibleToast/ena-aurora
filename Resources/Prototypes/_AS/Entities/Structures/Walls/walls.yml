#region Base Shuttle Wall

- type: entity
  parent: WallShuttleDiagonal
  id: WallShuttleDiagonalThin
  name: shuttle wall (diagonal, thin)
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _AS/Structures/Walls/shuttle_diagonal_thin.rsi
    state: state0
  - type: Icon
    sprite: _AS/Structures/Walls/shuttle_diagonal_thin.rsi
    state: state0
  - type: Construction
    graph: Girder
    node: diagonalshuttleWallThin

