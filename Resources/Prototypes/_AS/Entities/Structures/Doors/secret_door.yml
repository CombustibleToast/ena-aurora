#shuttle secret door
- type: entity
  id: ShuttleSecretDoorDarkAssembly
  name: dark secret shuttle door assembly
  parent: BaseSecretDoorAssembly
  components:
  - type: Sprite
    sprite: _AS/Structures/Doors/secret_door_shuttle_dark.rsi
    state: assembly
  - type: Construction
    graph: ShuttleSecretDoorDarkGraph
    node: assembly
  placement:
    mode: SnapgridCenter

- type: entity
  id: ShuttleSecretDoorDark
  name: dark shuttle wall
  parent: BaseSecretDoor
  components:
  - type: Sprite
    sprite: _AS/Structures/Doors/secret_door_shuttle_dark.rsi
  - type: Construction
    graph: ShuttleSecretDoorDarkGraph
    node: ShuttleSecretDoorDarkNode
    containers:
    - battery-container
