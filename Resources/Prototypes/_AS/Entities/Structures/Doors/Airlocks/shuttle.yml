# region Dark

- type: entity
  parent: AirlockShuttle
  id: AirlockShuttleDark
  suffix: Docking
  name: dark external airlock
  description: Necessary for connecting two space craft together.
  components:
  - type: Sprite
    sprite: _AS/Structures/Doors/Airlocks/Standard/shuttle_dark.rsi
    state: closed

- type: entity
  parent: AirlockGlassShuttle
  id: AirlockGlassShuttleDark
  suffix: Glass, Docking
  name: dark external airlock
  description: Necessary for connecting two space craft together.
  components:
  - type: Sprite
    sprite: _AS/Structures/Doors/Airlocks/Glass/shuttle_dark.rsi
    state: closed

- type: entity
  id: AirlockShuttleAssemblyDark
  parent: AirlockAssembly
  name: dark external airlock assembly
  suffix: Docking
  description: An incomplete structure necessary for connecting two space craft together.
  components:
  - type: Transform
    anchored: true
    noRot: false
  - type: Rotatable
  - type: Sprite
    sprite: _AS/Structures/Doors/Airlocks/Standard/shuttle_dark.rsi
    state: closed
    snapCardinals: false
  - type: Construction
    graph: AirlockShuttleDark
    node: assembly

