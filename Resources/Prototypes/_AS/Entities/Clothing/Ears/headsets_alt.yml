# Aurora Song - SLE (Sector Law Enforcement) alt headsets
# Prototypes for Aurora Song's SLE faction equipment - over-ear variants

- type: entity
  parent: ClothingHeadsetAlt
  id: ASClothingHeadsetAltSLENavy
  name: SLE over-ear headset
  description: An updated over-ear headset for Sector Law Enforcement personnel.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyNfsd
      - EncryptionKeyCommand
  - type: Sprite
    sprite: _AS/Clothing/Ears/Headsets/sle_h_navy.rsi # Aurora Song - Using SLE-recolored sprites
  - type: Clothing
    sprite: _AS/Clothing/Ears/Headsets/sle_h_navy.rsi # Aurora Song - Using SLE-recolored sprites

