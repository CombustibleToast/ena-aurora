- type: entity
  parent: ClothingHeadHelmetHardsuitMercenary
  id: ClothingHeadHelmetHardsuitPrivateSecurity
  name: private security hardsuit helmet
  description: Lightly armored hardsuit helmet for private security needs.
  components:
  - type: Sprite
    sprite: _AS/Clothing/Head/Hardsuits/private_security.rsi
    layers:
    - state: icon
    - state: icon-flash
      visible: false
      map: [ "light" ]
  - type: Clothing
    sprite: _AS/Clothing/Head/Hardsuits/private_security.rsi
    clothingVisuals:
      head:
      - state: equipped-head
      - state: equipped-head-unshaded
        shader: unshaded
      head-vox:
      - state: equipped-head-vox
      - state: equipped-head-unshaded-vox
        shader: unshaded
      head-vulpkanin:
      - state: equipped-head-vulpkanin
      - state: equipped-head-unshaded-vulpkanin
        shader: unshaded
      head-reptilian:
      - state: equipped-head-reptilian
      - state: equipped-head-unshaded-reptilian
        shader: unshaded
      head-felinid:
      - state: equipped-head-felinid
      - state: equipped-head-unshaded-felinid
        shader: unshaded
      head-feroxi:
      - state: equipped-head-feroxi
      - state: equipped-head-unshaded-feroxi
        shader: unshaded
  - type: HandheldLight
    addPrefix: false
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: equipped-head-light
        shader: unshaded
      head-vox:
      - state: equipped-head-light-vox
        shader: unshaded
      head-vulpkanin:
      - state: equipped-head-light-vulpkanin
        shader: unshaded
      head-reptilian:
      - state: equipped-head-light-reptilian
        shader: unshaded
      head-felinid:
      - state: equipped-head-light-felinid
        shader: unshaded
      head-feroxi:
      - state: equipped-head-light-feroxi
        shader: unshaded
  - type: PointLight
    enabled: false
    color: "#00ffff"
    radius: 7
    energy: 3
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false

